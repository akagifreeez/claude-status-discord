name: Claude Status → Discord

on:
  # 定期実行は k8s CronJob (k8s/cronjob.yaml) に移行したため schedule は無効化。
  # GitHub の cron は間引かれて数時間空くことがあるため、確実な5分間隔は CronJob 側で担保する。
  # ここでは手動実行(workflow_dispatch)のみ残す。
  workflow_dispatch: {}

# 同時実行を防ぐ(state.json の競合回避)
concurrency:
  group: claude-status
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Claude status and notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_FORUM: "1"   # 通知先がフォーラムチャンネルのため
        run: python notify.py

      - name: Commit updated state (only if changed)
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update notified-incident state [skip ci]"
            git push
          else
            echo "state.json に変更なし。コミットしません。"
          fi
